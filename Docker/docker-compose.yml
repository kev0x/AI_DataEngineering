# Purpose: Defines the local development runtime for the full project.
# Runtime role: Starts warehouse deployment/population, FastAPI, React/Vite, and DuckDB UI from one docker compose command.
# Dependencies: Docker/Dockerfile, Docker/requirements*.txt, DataWarehouse/, app/, Frontend/, data/private/, and warehouse/.

services:
  warehouse-deploy:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    image: ai-data-engineering:local
    command:
      - python
      - DataWarehouse/Deployment/deployWarehouse.py
      - --warehouse
      - /app/warehouse/finance.duckdb
      - --populate
      - --data-root
      - /app/data/private/chase
    volumes:
      - ../data/private:/app/data/private:ro
      - ../warehouse:/app/warehouse

  api:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    image: ai-data-engineering:local
    command:
      - python
      - -m
      - uvicorn
      - app.api:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    environment:
      WAREHOUSE_PATH: /app/warehouse/finance.duckdb
    ports:
      - "4000:8000"
    volumes:
      - ../warehouse:/app/warehouse
    depends_on:
      warehouse-deploy:
        condition: service_completed_successfully

  web:
    image: node:22-alpine
    working_dir: /app/Frontend
    command:
      - sh
      - -c
      - npm install && npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      VITE_API_BASE_URL: http://localhost:4000
    ports:
      - "5173:5173"
    volumes:
      - ../Frontend:/app/Frontend

  duckdb-ui:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
      args:
        REQUIREMENTS_FILE: Docker/requirements-ui.txt
    image: ai-data-engineering-duckdb-ui:local
    command:
      - python
      - -m
      - app.duckdb_ui
    environment:
      WAREHOUSE_PATH: /app/warehouse/finance.duckdb
      DUCKDB_UI_CATALOG_PATH: /tmp/duckdb_ui_catalog.duckdb
      DUCKDB_UI_WAREHOUSE_SNAPSHOT_PATH: /tmp/duckdb_ui_finance_snapshot.duckdb
      DUCKDB_UI_DATABASE_ALIAS: finance
      DUCKDB_UI_INTERNAL_PORT: "4214"
      DUCKDB_UI_PROXY_PORT: "4213"
    ports:
      - "4213:4213"
    volumes:
      - ../warehouse:/app/warehouse
    depends_on:
      warehouse-deploy:
        condition: service_completed_successfully
